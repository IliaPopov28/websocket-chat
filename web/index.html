<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Auth screen --- */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #auth-screen h1 {
            margin-bottom: 24px;
            color: #e94560;
        }

        #auth-form {
            display: flex;
            flex-direction: column;
            width: 300px;
            gap: 12px;
        }

        #auth-form input {
            padding: 10px 16px;
            font-size: 14px;
            border: 2px solid #16213e;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            outline: none;
        }

        #auth-form input:focus {
            border-color: #e94560;
        }

        #auth-form button {
            padding: 10px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
        }

        #auth-form button:hover {
            background: #c73650;
        }

        #auth-toggle {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #aaa;
        }

        #auth-toggle a {
            color: #e94560;
            cursor: pointer;
            text-decoration: underline;
        }

        #auth-error {
            color: #f44336;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        /* --- Chat screen --- */
        #chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        #chat-header {
            padding: 12px 20px;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header h2 {
            color: #e94560;
        }

        #chat-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #users-panel {
            width: 200px;
            background: #16213e;
            padding: 12px;
            overflow-y: auto;
        }

        #users-panel h3 {
            margin-bottom: 8px;
            color: #e94560;
            font-size: 14px;
        }

        #users-list {
            list-style: none;
        }

        #users-list li {
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #users-list li:hover {
            background: #0f3460;
        }

        .pm-btn {
            background: #e94560;
            border: none;
            color: #fff;
            border-radius: 3px;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .pm-btn:hover {
            background: #c73650;
        }

        #private-chat-header {
            display: none;
            padding: 8px 12px;
            background: #1a3a5c;
            color: #e94560;
            font-size: 13px;
            justify-content: space-between;
            align-items: center;
        }

        #private-chat-header .close-pm {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
        }

        #messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .message {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            max-width: 70%;
        }

        .message.public {
            background: #0f3460;
            align-self: flex-start;
        }

        .message.private {
            background: #1a3a5c;
            border-left: 3px solid #e94560;
        }

        .message.system {
            background: #2a2a4a;
            color: #aaa;
            font-style: italic;
            max-width: 100%;
            text-align: center;
        }

        .message.error {
            background: #5c1a1a;
            border-left: 3px solid #ff4444;
        }

        .message .sender {
            font-weight: bold;
            color: #e94560;
            font-size: 12px;
        }

        .message .time {
            font-size: 10px;
            color: #666;
            float: right;
        }

        .message .content {
            margin-top: 4px;
        }

        #input-area {
            display: flex;
            padding: 12px;
            background: #16213e;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            font-size: 14px;
            outline: none;
        }

        #message-input:focus {
            border: 1px solid #e94560;
        }

        #send-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:hover {
            background: #c73650;
        }
    </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
    <h1>WebSocket Chat</h1>
    <form id="auth-form">
        <input type="text" id="nickname-input" placeholder="Nickname" maxlength="32" required>
        <input type="password" id="password-input" placeholder="Password" required>
        <div id="auth-error"></div>
        <button type="submit" id="auth-btn">Login</button>
    </form>
    <div id="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a id="auth-toggle-link">Register</a>
    </div>
</div>

<!-- Chat screen -->
<div id="chat-screen">
    <div id="chat-header">
        <h2 id="chat-title">Chat</h2>
        <span id="connection-status" style="color: #4caf50;">Connected</span>
        <button id="logout-btn" style="background:none;border:1px solid #e94560;color:#e94560;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:13px;">Logout</button>
    </div>
    <div id="chat-body">
        <div id="users-panel">
            <h3>Online Users</h3>
            <ul id="users-list"></ul>
        </div>
        <div id="messages-area">
            <div id="private-chat-header">
                <span id="pm-target-label"></span>
                <button class="close-pm" id="close-pm-btn">&times;</button>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let myNickname = '';
    let myToken = '';
    let privateTarget = '';
    let isRegisterMode = false;

    const authScreen = document.getElementById('auth-screen');
    const chatScreen = document.getElementById('chat-screen');
    const authForm = document.getElementById('auth-form');
    const nicknameInput = document.getElementById('nickname-input');
    const passwordInput = document.getElementById('password-input');
    const authBtn = document.getElementById('auth-btn');
    const authError = document.getElementById('auth-error');
    const authToggleText = document.getElementById('auth-toggle-text');
    const authToggleLink = document.getElementById('auth-toggle-link');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const usersList = document.getElementById('users-list');
    const connectionStatus = document.getElementById('connection-status');
    const privateChatHeader = document.getElementById('private-chat-header');
    const pmTargetLabel = document.getElementById('pm-target-label');
    const closePmBtn = document.getElementById('close-pm-btn');
    const logoutBtn = document.getElementById('logout-btn');

    // Toggle login/register
    authToggleLink.addEventListener('click', () => {
        isRegisterMode = !isRegisterMode;
        if (isRegisterMode) {
            authBtn.textContent = 'Register';
            authToggleText.textContent = 'Already have an account?';
            authToggleLink.textContent = 'Login';
        } else {
            authBtn.textContent = 'Login';
            authToggleText.textContent = "Don't have an account?";
            authToggleLink.textContent = 'Register';
        }
        authError.textContent = '';
    });

    // Submit auth form
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nick = nicknameInput.value.trim();
        const pass = passwordInput.value.trim();
        if (!nick || !pass) return;

        authError.textContent = '';
        authBtn.disabled = true;

        const endpoint = isRegisterMode ? '/api/register' : '/api/login';

        try {
            const resp = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname: nick, password: pass }),
            });

            const data = await resp.json();

            if (!resp.ok) {
                authError.textContent = data.error || 'Something went wrong';
                authBtn.disabled = false;
                return;
            }

            // Сохраняем токен в localStorage — переживёт обновление страницы.
            myToken = data.token;
            myNickname = nick;
            localStorage.setItem('ws_chat_token', myToken);
            localStorage.setItem('ws_chat_nick', myNickname);

            showChat();
        } catch {
            authError.textContent = 'Cannot connect to server';
            authBtn.disabled = false;
        }
    });

    // Флаг: пользователь нажал Logout — не нужно реконнектиться.
    let isLoggingOut = false;

    logoutBtn.addEventListener('click', () => {
        isLoggingOut = true;
        if (ws) ws.close();
        localStorage.removeItem('ws_chat_token');
        localStorage.removeItem('ws_chat_nick');
        myToken = '';
        myNickname = '';
        chatScreen.style.display = 'none';
        authScreen.style.display = 'flex';
        authBtn.disabled = false;
        authError.textContent = '';
        nicknameInput.value = '';
        passwordInput.value = '';
    });

    function tryRestoreSession() {
        const savedToken = localStorage.getItem('ws_chat_token');
        const savedNick = localStorage.getItem('ws_chat_nick');
        if (savedToken && savedNick) {
            myToken = savedToken;
            myNickname = savedNick;
            showChat();
        }
    }

    function showChat() {
        authScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        document.getElementById('chat-title').textContent = `Chat — ${myNickname}`;
        connect();
    }

    function connect() {
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws?token=${encodeURIComponent(myToken)}`);

        ws.onopen = () => {
            connectionStatus.textContent = 'Connected';
            connectionStatus.style.color = '#4caf50';
        };

        ws.onmessage = (event) => {
            const lines = event.data.split('\n');
            for (const line of lines) {
                if (!line.trim()) continue;
                const msg = JSON.parse(line);
                if (msg.type === 'user_list') {
                    updateUsersList(msg.users);
                } else {
                    renderMessage(msg);
                }
            }
        };

        ws.onclose = () => {
            connectionStatus.textContent = 'Disconnected';
            connectionStatus.style.color = '#f44336';

            if (isLoggingOut) return;

            // Авто-реконнект через 3 секунды.
            setTimeout(() => {
                if (myToken) connect();
            }, 3000);
        };

        ws.onerror = () => {
            connectionStatus.textContent = 'Error';
            connectionStatus.style.color = '#f44336';
        };
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    closePmBtn.addEventListener('click', () => {
        privateTarget = '';
        privateChatHeader.style.display = 'none';
        messageInput.placeholder = 'Type a message...';
    });

    function sendMessage() {
        const content = messageInput.value.trim();
        if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

        const msg = {
            type: privateTarget ? 'private' : 'public',
            recipient: privateTarget || undefined,
            content: content,
        };

        ws.send(JSON.stringify(msg));
        messageInput.value = '';
    }

    function renderMessage(msg) {
        const div = document.createElement('div');
        div.classList.add('message', msg.type);

        const time = new Date(msg.timestamp).toLocaleTimeString();

        let html = '';
        if (msg.type !== 'system' && msg.type !== 'user_list') {
            let senderLabel = escapeHtml(msg.sender);
            if (msg.type === 'private' && msg.recipient) {
                senderLabel += ` → ${escapeHtml(msg.recipient)}`;
            }
            html += `<span class="sender">${senderLabel}</span>`;
            html += `<span class="time">${time}</span>`;
        }
        html += `<div class="content">${escapeHtml(msg.content)}</div>`;

        div.innerHTML = html;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function updateUsersList(users) {
        usersList.innerHTML = '';

        for (const user of users) {
            const li = document.createElement('li');

            const nameSpan = document.createElement('span');
            nameSpan.textContent = user;
            li.appendChild(nameSpan);

            if (user !== myNickname) {
                const pmBtn = document.createElement('button');
                pmBtn.classList.add('pm-btn');
                pmBtn.textContent = 'PM';
                pmBtn.addEventListener('click', () => {
                    privateTarget = user;
                    privateChatHeader.style.display = 'flex';
                    pmTargetLabel.textContent = `Private chat with ${user}`;
                    messageInput.placeholder = `Message to ${user}...`;
                    messageInput.focus();
                });
                li.appendChild(pmBtn);
            }

            usersList.appendChild(li);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // При загрузке — пробуем восстановить сессию.
    tryRestoreSession();
</script>

</body>
</html>
