<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #login-screen h1 {
            margin-bottom: 20px;
            color: #e94560;
        }

        #login-screen input {
            padding: 10px 16px;
            font-size: 16px;
            border: 2px solid #16213e;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            outline: none;
        }

        #login-screen input:focus {
            border-color: #e94560;
        }

        #login-screen button {
            margin-top: 12px;
            padding: 10px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
        }

        #login-screen button:hover {
            background: #c73650;
        }

        #chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        #chat-header {
            padding: 12px 20px;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header h2 {
            color: #e94560;
        }

        #chat-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #users-panel {
            width: 200px;
            background: #16213e;
            padding: 12px;
            overflow-y: auto;
        }

        #users-panel h3 {
            margin-bottom: 8px;
            color: #e94560;
            font-size: 14px;
        }

        #users-list {
            list-style: none;
        }

        #users-list li {
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #users-list li:hover {
            background: #0f3460;
        }

        .pm-btn {
            background: #e94560;
            border: none;
            color: #fff;
            border-radius: 3px;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .pm-btn:hover {
            background: #c73650;
        }

        #private-chat-header {
            display: none;
            padding: 8px 12px;
            background: #1a3a5c;
            color: #e94560;
            font-size: 13px;
            justify-content: space-between;
            align-items: center;
        }

        #private-chat-header .close-pm {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
        }

        #messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .message {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            max-width: 70%;
        }

        .message.public {
            background: #0f3460;
            align-self: flex-start;
        }

        .message.private {
            background: #1a3a5c;
            border-left: 3px solid #e94560;
        }

        .message.system {
            background: #2a2a4a;
            color: #aaa;
            font-style: italic;
            max-width: 100%;
            text-align: center;
        }

        .message.error {
            background: #5c1a1a;
            border-left: 3px solid #ff4444;
        }

        .message .sender {
            font-weight: bold;
            color: #e94560;
            font-size: 12px;
        }

        .message .time {
            font-size: 10px;
            color: #666;
            float: right;
        }

        .message .content {
            margin-top: 4px;
        }

        #input-area {
            display: flex;
            padding: 12px;
            background: #16213e;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            font-size: 14px;
            outline: none;
        }

        #message-input:focus {
            border: 1px solid #e94560;
        }

        #send-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:hover {
            background: #c73650;
        }

        #private-target {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #0f3460;
            color: #eee;
            font-size: 14px;
            width: 140px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>WebSocket Chat</h1>
    <input type="text" id="nickname-input" placeholder="Enter your nickname..." maxlength="20">
    <span id="nick-error" style="color: #f44336; font-size: 14px; margin-top: 8px; display: none;"></span>
    <button id="join-btn">Join</button>
</div>

<div id="chat-screen">
    <div id="chat-header">
        <h2 id="chat-title">Chat</h2>
        <span id="connection-status" style="color: #4caf50;">Connected</span>
    </div>
    <div id="chat-body">
        <div id="users-panel">
            <h3>Online Users</h3>
            <ul id="users-list"></ul>
        </div>
        <div id="messages-area">
            <div id="private-chat-header">
                <span id="pm-target-label"></span>
                <button class="close-pm" id="close-pm-btn">&times;</button>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let myNickname = '';
    let privateTarget = '';

    const loginScreen = document.getElementById('login-screen');
    const chatScreen = document.getElementById('chat-screen');
    const nicknameInput = document.getElementById('nickname-input');
    const nickError = document.getElementById('nick-error');
    const joinBtn = document.getElementById('join-btn');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const usersList = document.getElementById('users-list');
    const connectionStatus = document.getElementById('connection-status');
    const privateChatHeader = document.getElementById('private-chat-header');
    const pmTargetLabel = document.getElementById('pm-target-label');
    const closePmBtn = document.getElementById('close-pm-btn');

    joinBtn.addEventListener('click', checkNick);
    nicknameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkNick();
    });

    // Проверка ника через HTTP перед подключением.
    async function checkNick() {
        const nick = nicknameInput.value.trim();
        if (!nick) return;

        nickError.style.display = 'none';
        joinBtn.disabled = true;

        try {
            const resp = await fetch(`/api/check-nick?nick=${encodeURIComponent(nick)}`);
            if (resp.status === 409) {
                const data = await resp.json();
                nickError.textContent = data.error;
                nickError.style.display = 'block';
                joinBtn.disabled = false;
                return;
            }
            if (!resp.ok) {
                nickError.textContent = 'Server error, try again';
                nickError.style.display = 'block';
                joinBtn.disabled = false;
                return;
            }
        } catch {
            nickError.textContent = 'Cannot connect to server';
            nickError.style.display = 'block';
            joinBtn.disabled = false;
            return;
        }

        myNickname = nick;
        connect();
    }

    function connect() {
        ws = new WebSocket(`ws://localhost:8081/ws?nick=${encodeURIComponent(myNickname)}`);

        ws.onopen = () => {
            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            document.getElementById('chat-title').textContent = `Chat — ${myNickname}`;
        };

        ws.onmessage = (event) => {
            const lines = event.data.split('\n');
            for (const line of lines) {
                if (!line.trim()) continue;
                const msg = JSON.parse(line);
                if (msg.type === 'user_list') {
                    updateUsersList(msg.users);
                } else {
                    renderMessage(msg);
                }
            }
        };

        ws.onclose = () => {
            connectionStatus.textContent = 'Disconnected';
            connectionStatus.style.color = '#f44336';
        };

        ws.onerror = () => {
            connectionStatus.textContent = 'Error';
            connectionStatus.style.color = '#f44336';
        };
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    closePmBtn.addEventListener('click', () => {
        privateTarget = '';
        privateChatHeader.style.display = 'none';
        messageInput.placeholder = 'Type a message...';
    });

    function sendMessage() {
        const content = messageInput.value.trim();
        if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

        const msg = {
            type: privateTarget ? 'private' : 'public',
            recipient: privateTarget || undefined,
            content: content,
        };

        ws.send(JSON.stringify(msg));
        messageInput.value = '';
    }

    function renderMessage(msg) {
        const div = document.createElement('div');
        div.classList.add('message', msg.type);

        const time = new Date(msg.timestamp).toLocaleTimeString();

        let html = '';
        if (msg.type !== 'system' && msg.type !== 'user_list') {
            let senderLabel = escapeHtml(msg.sender);
            if (msg.type === 'private' && msg.recipient) {
                senderLabel += ` → ${escapeHtml(msg.recipient)}`;
            }
            html += `<span class="sender">${senderLabel}</span>`;
            html += `<span class="time">${time}</span>`;
        }
        html += `<div class="content">${escapeHtml(msg.content)}</div>`;

        div.innerHTML = html;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function updateUsersList(users) {
        usersList.innerHTML = '';

        for (const user of users) {
            const li = document.createElement('li');

            const nameSpan = document.createElement('span');
            nameSpan.textContent = user;
            li.appendChild(nameSpan);

            if (user !== myNickname) {
                const pmBtn = document.createElement('button');
                pmBtn.classList.add('pm-btn');
                pmBtn.textContent = 'PM';
                pmBtn.addEventListener('click', () => {
                    privateTarget = user;
                    privateChatHeader.style.display = 'flex';
                    pmTargetLabel.textContent = `Private chat with ${user}`;
                    messageInput.placeholder = `Message to ${user}...`;
                    messageInput.focus();
                });
                li.appendChild(pmBtn);
            }

            usersList.appendChild(li);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
