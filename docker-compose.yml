services:
  postgres:
    image: postgres:17-alpine
    container_name: ws-chat-db
    environment:
      POSTGRES_USER: wschat
      POSTGRES_PASSWORD: wschat_secret
      POSTGRES_DB: wschat
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wschat -d wschat"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws-chat-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
